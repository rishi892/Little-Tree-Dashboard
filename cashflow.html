<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#15803d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Cashflow" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="icon" type="image/png" href="/LT Logo.png" />
    <link rel="apple-touch-icon" href="/LT Logo.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="googlebot" content="noindex, nofollow" />
    <title>Cashflow Dashboard | Little Tree</title>

    <!-- Inline pre-bundle paint so the browser shows a clean light surface
         while the React bundle parses. No spinner / logo here — auth is
         enforced by CashflowApp itself, which immediately redirects to the
         AR-shell when localStorage isn't set. Long animations would just
         delay that redirect. -->
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #f7f8fa; }
      #root { min-height: 100%; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/cashflow/main.tsx"></script>
  </body>
</html>
